services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pasmada
      POSTGRES_PASSWORD: pasmada_secret
      POSTGRES_DB: pasmada
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://pasmada:pasmada_secret@db:5432/pasmada
    depends_on:
      - db
    profiles:
      - production

volumes:
  postgres_data:
